name: Build and push

on:
  push:
    branches: [main, forgejo/main]
  pull_request:
    branches: [main, forgejo/main]
  schedule:
    - cron: '05 10 * * *'
  workflow_dispatch:

env:
  IMAGE_REGISTRY: ghcr.io/akinus21
  IMAGE_NAME: niello

jobs:
  # ── Validation: fast checks before any build ──────────────────────
  validate:
    name: Validate Containerfile
    runs-on: rust-ci
    steps:
      - name: Check out
        uses: actions/checkout@v4

      - name: Syntax check
        run: |
          set -euo pipefail

          if [[ ! -f Containerfile ]]; then
            echo "ERROR: Containerfile not found"
            exit 1
          fi

          echo "Validating Containerfile syntax..."

          # Check for merged RUN commands with trailing backslash
          if grep -q '^RUN.*\\$' Containerfile; then
            echo "WARNING: Line continuation detected in RUN command"
          fi

          # Ensure base image is set
          if ! head -20 Containerfile | grep -q '^FROM'; then
            echo "ERROR: No FROM instruction found in first 20 lines"
            exit 1
          fi

          echo "Containerfile validation passed"

  # ── Main build: runs buildah directly ────────────────────────────
  build:
    name: Build image
    runs-on: rust-ci
    needs: validate
    permissions:
      contents: read
      packages: write
    env:
      CONTAINERS_REGISTRIES_CONF: /etc/containers/registries.conf
    steps:
      - name: Check out
        uses: actions/checkout@v4

      - name: Fix registries configuration
        run: |
          # Create a minimal registries.conf that avoids v1/v2 mixing
          sudo tee /etc/containers/registries.conf > /dev/null << 'EOF'
          [registries.search]
          registries = ["docker.io", "quay.io", "registry.fedoraproject.org"]

          [registries.block]
          registries = []
          EOF

      - name: Build with buildah
        uses: redhat-actions/buildah-build@v2
        with:
          containerfiles: |
            ./Containerfile
          image: ${{ env.IMAGE_REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: latest
          registry: ghcr.io
          registry-user: ${{ github.actor }}
          registry-password: ${{ secrets.GITHUB_TOKEN }}
          build-args: |
            BUILD_JOB=1

  # ── Build NVIDIA variant ─────────────────────────────────────────
  build-nvidia:
    name: Build NVIDIA variant
    runs-on: rust-ci
    needs: validate
    permissions:
      contents: read
      packages: write
    steps:
      - name: Check out
        uses: actions/checkout@v4

      - name: Build NVIDIA variant with buildah
        uses: redhat-actions/buildah-build@v2
        with:
          containerfiles: |
            ./Containerfile
          image: ${{ env.IMAGE_REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: nvidia
          registry: ghcr.io
          registry-user: ${{ github.actor }}
          registry-password: ${{ secrets.GITHUB_TOKEN }}
          build-args: |
            BUILD_JOB=1
            GAMING=true

  # ── On success: push images ──────────────────────────────────────
  push:
    name: Push image
    runs-on: rust-ci
    needs: [build, build-nvidia]
    if: github.event_name != 'pull_request'
    steps:
      - name: Check out
        uses: actions/checkout@v4

      - name: Push to GHCR
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | buildah login -u ${{ github.actor }} --password-stdin ghcr.io
          buildah push ${{ env.IMAGE_REGISTRY }}/${{ env.IMAGE_NAME }}:latest
          buildah push ${{ env.IMAGE_REGISTRY }}/${{ env.IMAGE_NAME }}:nvidia

  # ── On failure: create fix branch ───────────────────────────────
  fix:
    name: Create fix
    runs-on: rust-ci
    needs: validate
    if: failure() && github.event_name == 'push'
    permissions:
      contents: write
      packages: write
    steps:
      - name: Check out
        uses: actions/checkout@v4

      - name: Create fix branch
        run: |
          set -euo pipefail

          BRANCH_NAME="fix/build-$(date +%Y%m%d%H%M%S)"

          git checkout -b "$BRANCH_NAME"

          # Apply common fixes based on typical build failures

          # Fix 1: Remove trailing backslash from RUN commands
          sed -i 's/RUN.*\\$/RUN echo "Fixed trailing backslash"/' Containerfile || true

          # Fix 2: Ensure dnf install commands are properly formed
          sed -i 's/dnf install -y \\$/dnf install -y/' Containerfile || true

          if git diff --quiet; then
            echo "No automatic fixes applied"
            git checkout main || git checkout forgejo/main
            exit 0
          fi

          git add -A
          git commit -m "fix: address build errors

          Automated fix based on build failure analysis"

          git push -u origin "$BRANCH_NAME"

      - name: Create PR
        if: github.repository != ''
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          BRANCH_NAME=$(git branch --show-output)
          gh pr create \
            --title "Build fix: ${BRANCH_NAME#refs/heads/}" \
            --body "Automated build fix created due to build failure.

          Please review the changes and merge if appropriate." \
            --base main
