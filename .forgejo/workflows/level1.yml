name: Level 1 — Main
run-name: "▲ ${{ github.event.head_commit.message }}"

on:
  push:
    branches: [main]  # edit if your default branch is named differently

env:
  BOT_NAME:            ${{ vars.BOT_NAME || 'devops-bot' }}
  BOT_EMAIL:           ${{ vars.BOT_EMAIL || 'devops-bot@akinus21.com' }}
  MAIN_BRANCH:         ${{ vars.MAIN_BRANCH || 'main' }}
  DEVOPS_BRANCH:       ${{ vars.DEVOPS_BRANCH || 'devops' }}
  ISSUE_BRANCH_PREFIX: ${{ vars.ISSUE_BRANCH_PREFIX || 'issue-' }}
  REGISTRY:            ${{ vars.REGISTRY || 'forge.akinus21.com' }}
  IMAGE:               ${{ vars.IMAGE || 'forge.akinus21.com/akinus/niello' }}
  OPENCODE_MODEL:      ${{ vars.OPENCODE_MODEL || '' }}
  GITHUB_SERVER_URL:   ${{ github.server_url }}
  GITHUB_REPOSITORY:   ${{ github.repository }}
  RUNNER_LABEL:        ${{ vars.RUNNER_LABEL || 'rust-ci' }}
  CONTAINER_IMAGE:     ${{ vars.CONTAINER_IMAGE || 'ghcr.io/akinus21/rust-ci:latest' }}

concurrency:
  group: level1-${{ github.ref }}
  cancel-in-progress: false

jobs:
  # ============================================================
  # build-push: build the Niello container image and push to
  # the Forgejo registry. Tags: latest + YYYY-MM-DD.
  # AI-fix loop on failure: opencode edits the Containerfile.
  # ============================================================
  build-push:
    if: contains(github.event.head_commit.message, '[release-bot-skip]') == false
    runs-on: ${{ vars.RUNNER_LABEL || 'rust-ci' }}
    # container removed - build on host with host tools
    steps:
      - name: Debug environment
        run: |
          echo "=== Environment ==="
          echo "RUNNER_LABEL: ${{ vars.RUNNER_LABEL }}"
          echo "CONTAINER_IMAGE: ${{ vars.CONTAINER_IMAGE }}"
          echo "GITHUB_ACTOR: ${{ github.actor }}"
          echo "REGISTRY: $REGISTRY"
          echo "IMAGE: $IMAGE"

      - name: Setup podman
        run: |
          set -e
          if ! command -v podman >/dev/null 2>&1; then
            echo "Installing podman..."
            dnf install -y podman buildah || apt-get install -y podman buildah || true
          fi
          echo "Using podman: $(command -v podman)"

      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Preflight
        run: |
          set -e
          echo "=== Preflight starting ==="
          echo "RUNNER_LABEL: $RUNNER_LABEL"
          echo "CONTAINER_IMAGE: $CONTAINER_IMAGE"
          echo "Checking podman..."
          command -v podman >/dev/null 2>&1 || {
            echo "::error::podman not on PATH — rebuild the rust-ci image with podman installed"
            exit 1
          }
          echo "podman found: $(command -v podman)"
          echo "Checking opencode..."
          command -v opencode >/dev/null 2>&1 || {
            echo "::error::opencode not on PATH"
            exit 1
          }
          echo "opencode found: $(command -v opencode)"
          echo "Checking github.token..."
          [ -n "${{ github.token }}" ] || {
            echo "::error::github.token is empty; ensure forgejo-actions auto-token is enabled"
            exit 1
          }
          echo "github.token is present"
          echo "=== Preflight completed ==="

      - name: Configure podman for insecure registry
        run: |
          mkdir -p /etc/containers
          printf '%s\n' '[registries.insecure]' "registries = ['forge.akinus21.com']" > /etc/containers/registries.conf
          mkdir -p ~/.config/containers
          printf '%s\n' '[registries.insecure]' "registries = ['forge.akinus21.com']" > ~/.config/containers/registries.conf

      - name: Registry login
        run: |
          set -e
          echo "Logging into $REGISTRY with user $GITHUB_ACTOR"
          mkdir -p ~/.docker
          # Use printf to avoid ash substitution issues
          printf '%s' "$GITHUB_ACTOR:$PACKAGE_TOKEN" | base64 -w 0 > /tmp/auth_base64
          AUTH=$(cat /tmp/auth_base64)
          printf '{"auths":{"%s":{"auth":"%s"}}}' "$REGISTRY" "$AUTH" > ~/.docker/config.json
          cat ~/.docker/config.json
          rm -f /tmp/auth_base64
          echo "Auth config created"
        env:
          GITHUB_ACTOR: ${{ github.actor }}
          PACKAGE_TOKEN: ${{ secrets.PACKAGE_TOKEN }}
          REGISTRY: ${{ env.REGISTRY }}

      - name: Build image
        id: build
        run: |
          set -e
          echo "=== Build image starting ==="
          mkdir -p /etc/containers
          printf '%s\n' '[storage]' 'driver = "vfs"' > /etc/containers/storage.conf
          printf '%s\n' '[registries.insecure]' "registries = ['forge.akinus21.com']" > /etc/containers/registries.conf
          # Try buildah first, fall back to podman
          if command -v buildah >/dev/null 2>&1; then
            echo "=== Using buildah ==="
            buildah bud \
              --storage-driver=vfs \
              --tag forge.akinus21.com/akinus/niello:latest \
              --tag forge.akinus21.com/akinus/niello:2026-07-02 \
              .
          elif command -v podman >/dev/null 2>&1; then
            echo "=== Using podman ==="
            export PODMAN_CGROUP_MANAGER=none
            export PODMAN_USERNS=""
            podman build \
              --network=host \
              --security-opt label=disable \
              --tag forge.akinus21.com/akinus/niello:latest \
              --tag forge.akinus21.com/akinus/niello:2026-07-02 \
              .
          else
            echo "Neither buildah nor podman available!"
            exit 1
          fi
          echo "=== Build image completed ==="

      - name: AI-fix loop (3 attempts)
        if: steps.build.outcome == 'failure'
        run: |
          set -e
          for iter in 1 2 3; do
            echo "=== AI-fix iteration $iter ==="

            python3 - > /tmp/aifix.md <<'PYEOF'
          try:
              with open('/tmp/build.log', 'rb') as f:
                  log = f.read()[-12000:].decode('utf-8', errors='replace')
          except Exception:
              log = 'No build log available.'
          print('# Task')
          print()
          print('The container image build below failed. Read the Containerfile and any supporting files, find the root cause, and fix it.')
          print('Do not output JSON. Edit files directly using your tools.')
          print()
          print('# Workflow')
          print()
          print('1. Read the Containerfile and any related files (os-release override, systemd units, scripts).')
          print('2. Locate the root cause of the build failure from the log below.')
          print('3. Make the minimal fix. Edit files in place.')
          print('4. Do not commit — the workflow commits and pushes the diff after you return.')
          print()
          print('# Rules')
          print()
          print('- Make the minimal change that fixes the build.')
          print('- Do NOT edit `.forgejo/workflows/*`.')
          print('- Prefer fixing the Containerfile or supporting files over changing the base image unless the base image is clearly the problem.')
          print()
          print('# Build log (last 12KB)')
          print()
          print('```')
          print(log.rstrip())
          print('```')
          PYEOF

            MODEL_ARG=""
            if [ -n "$OPENCODE_MODEL" ]; then
              MODEL_ARG="--model $OPENCODE_MODEL"
            fi
            opencode run "$(cat /tmp/aifix.md)" \
              --format default \
              --pure \
              --dangerously-skip-permissions \
              $MODEL_ARG || true

            git config user.name  "$BOT_NAME"
            git config user.email "$BOT_EMAIL"
            git add -A
            if ! git diff --staged --quiet; then
              git commit -m "fix(ci): Containerfile AI-fix iteration $iter [release-bot-skip]"
              git push
            else
              echo "opencode produced no changes this iteration."
            fi

            set +e
            mkdir -p /etc/containers
            printf '%s\n' '[storage]' 'driver = "vfs"' > /etc/containers/storage.conf
            printf '%s\n' '[registries.insecure]' "registries = ['forge.akinus21.com']" > /etc/containers/registries.conf
            if command -v buildah >/dev/null 2>&1; then
              echo "=== Using buildah ==="
              buildah bud \
                --storage-driver=vfs \
                --tag forge.akinus21.com/akinus/niello:latest \
                --tag forge.akinus21.com/akinus/niello:2026-07-02 \
                . 2>&1 | tee /tmp/build.log
            else
              echo "=== Using podman ==="
              export PODMAN_CGROUP_MANAGER=none
              export PODMAN_USERNS=""
              podman build \
                --network=host \
                --security-opt label=disable \
                --tag forge.akinus21.com/akinus/niello:latest \
                --tag forge.akinus21.com/akinus/niello:2026-07-02 \
                . 2>&1 | tee /tmp/build.log
            fi
            BUILD_RC=$?
            set -e
            if [ "$BUILD_RC" = "0" ]; then
              echo "build OK after iteration $iter"
              exit 0
            fi
          done
          echo "AI-fix gave up after 3 iterations."
          exit 1

      - name: Push image
        run: |
          set -e
          echo "=== Push image starting ==="
          mkdir -p /etc/containers
          printf '%s\n' '[storage]' 'driver = "vfs"' > /etc/containers/storage.conf
          printf '%s\n' '[registries.insecure]' "registries = ['forge.akinus21.com']" > /etc/containers/registries.conf
          echo "Checking auth file..."
          cat ~/.docker/config.json || echo "No auth file found!"
          echo "=== Auth file contents above ==="
          DATE_TAG=2026-07-02
          echo "Using date_tag: $DATE_TAG"
          echo "=== Pushing forge.akinus21.com/akinus/niello:latest ==="
          set -x
          if command -v buildah >/dev/null 2>&1; then
            echo "=== Using buildah ==="
            buildah push \
              --authfile ~/.docker/config.json \
              forge.akinus21.com/akinus/niello:latest
          else
            echo "=== Using podman ==="
            export PODMAN_CGROUP_MANAGER=none
            export PODMAN_USERNS=""
            podman push \
              --authfile ~/.docker/config.json \
              forge.akinus21.com/akinus/niello:latest
          fi
          echo "=== Pushed forge.akinus21.com/akinus/niello:latest ==="
          set +x
          echo "=== Pushing forge.akinus21.com/akinus/niello:$DATE_TAG ==="
          set -x
          if command -v buildah >/dev/null 2>&1; then
            echo "=== Using buildah ==="
            buildah push \
              --authfile ~/.docker/config.json \
              forge.akinus21.com/akinus/niello:$DATE_TAG
          else
            echo "=== Using podman ==="
            export PODMAN_CGROUP_MANAGER=none
            export PODMAN_USERNS=""
            podman push \
              --authfile ~/.docker/config.json \
              forge.akinus21.com/akinus/niello:$DATE_TAG
          fi
          set +x
          echo "=== Pushed forge.akinus21.com/akinus/niello:$DATE_TAG ==="
          echo "pushed forge.akinus21.com/akinus/niello:latest and forge.akinus21.com/akinus/niello:$DATE_TAG"

  # ============================================================
  # tidy: delete orphaned issue branches, toggle stale labels.
  # ============================================================
  tidy:
    needs: build-push
    if: needs.build-push.result == 'success' || needs.build-push.result == 'skipped'
    runs-on: ${{ vars.RUNNER_LABEL || 'rust-ci' }}
    container: ${{ vars.CONTAINER_IMAGE || '' }}
    steps:
      - name: Delete orphaned issue branches + toggle stale labels
        env:
          FORGEJO_TOKEN:       ${{ github.token }}
          REPO:                ${{ github.repository }}
          ISSUE_BRANCH_PREFIX: ${{ vars.ISSUE_BRANCH_PREFIX || 'issue-' }}
          GITHUB_SERVER_URL:   ${{ github.server_url }}
        run: |
          set -e
          python3 - << 'PYEOF'
          import os, json, urllib.request, urllib.error
          from datetime import datetime, timezone, timedelta

          TOKEN      = os.environ['FORGEJO_TOKEN']
          REPO       = os.environ['REPO']
          SERVER     = os.environ['GITHUB_SERVER_URL']
          PREFIX     = os.environ.get('ISSUE_BRANCH_PREFIX', 'issue-')
          STALE_DAYS = 30
          TRACK      = {'bug', 'enhancement'}
          cutoff     = datetime.now(timezone.utc) - timedelta(days=STALE_DAYS)

          def api(method, path, body=None):
              data = json.dumps(body).encode() if body else None
              req = urllib.request.Request(
                  f"{SERVER}/api/v1/{path}", data=data, method=method,
                  headers={"Authorization": f"token {TOKEN}",
                           "Content-Type": "application/json"})
              try:
                  with urllib.request.urlopen(req) as r:
                      return json.loads(r.read() or b'{}')
              except urllib.error.HTTPError as e:
                  print(f"HTTP {e.code}: {method} {path}")
                  return {}

          branches = [b['name'] for b in api("GET", f"repos/{REPO}/branches?limit=100") or []
                      if b['name'].startswith(PREFIX)]

          for branch in branches:
              issue_n = branch[len(PREFIX):]
              issue = api("GET", f"repos/{REPO}/issues/{issue_n}")
              open_prs = api("GET", f"repos/{REPO}/pulls?state=open&head={branch}") or []
              if issue.get('state') == 'closed' and not open_prs:
                  api("DELETE", f"repos/{REPO}/branches/{branch}")
                  print(f"deleted orphaned branch: {branch}")
              elif open_prs:
                  print(f"skip {branch}: has open PR")
              else:
                  print(f"skip {branch}: issue #{issue_n} still open")

          stale_id = None
          issues = api("GET", f"repos/{REPO}/issues?state=open&type=issues&limit=100") or []

          for issue in issues:
              labels  = {l['name']: l['id'] for l in issue.get('labels', [])}
              updated = datetime.fromisoformat(issue['updated_at'].replace('Z', '+00:00'))
              number  = issue['number']
              if not (set(labels) & TRACK):
                  continue
              if updated < cutoff and 'stale' not in labels:
                  if stale_id is None:
                      for l in (api("GET", f"repos/{REPO}/labels") or []):
                          if l['name'] == 'stale':
                              stale_id = l['id']; break
                      if stale_id is None:
                          created = api("POST", f"repos/{REPO}/labels",
                                        {"name": "stale", "color": "#cccccc"})
                          stale_id = (created or {}).get('id')
                  if stale_id:
                      api("POST", f"repos/{REPO}/issues/{number}/labels", {"labels": [stale_id]})
                      print(f"marked #{number} stale")
              elif updated >= cutoff and 'stale' in labels:
                  api("DELETE", f"repos/{REPO}/issues/{number}/labels/{labels['stale']}")
                  print(f"removed stale from #{number}")
          PYEOF
