name: Level 3 — Issues
run-name: "${{ github.event_name == 'issues' && github.event.issue.number || github.ref_name }}"

on:
  issues:
    types: [opened, edited, labeled, unlabeled]
  push:
    branches: ['issue-*']  # edit if your issue branches use a different prefix

env:
  BOT_NAME:            ${{ vars.BOT_NAME || 'devops-bot' }}
  BOT_EMAIL:           ${{ vars.BOT_EMAIL || 'devops-bot@akinus21.com' }}
  DEVOPS_BRANCH:       ${{ vars.DEVOPS_BRANCH || 'devops' }}
  ISSUE_BRANCH_PREFIX: ${{ vars.ISSUE_BRANCH_PREFIX || 'issue-' }}
  GITHUB_SERVER_URL:   ${{ github.server_url }}
  GITHUB_REPOSITORY:   ${{ github.repository }}
  OPENCODE_MODEL:      ${{ vars.OPENCODE_MODEL || '' }}
  RUNNER_LABEL:        ${{ vars.RUNNER_LABEL || 'rust-ci' }}
  CONTAINER_IMAGE:     ${{ vars.CONTAINER_IMAGE || '' }}

concurrency:
  group: >-
    level3-${{ github.event_name == 'push' &&
    github.ref ||
    format('issue-{0}', github.event.issue.number) }}
  cancel-in-progress: true

jobs:
  # ============================================================
  # label_check: only bug/enhancement issues get auto-fixed.
  # ============================================================
  label_check:
    if: github.event_name == 'issues'
    runs-on: ${{ vars.RUNNER_LABEL || 'rust-ci' }}
    container: ${{ vars.CONTAINER_IMAGE || '' }}
    outputs:
      relevant: ${{ steps.check.outputs.relevant }}
    steps:
      - name: Preflight
        run: |
          set -euo pipefail
          command -v opencode >/dev/null 2>&1 || {
            echo "::error::opencode not on PATH"
            exit 1
          }
          [ -n "${{ github.token }}" ] || {
            echo "::error::github.token is empty"
            exit 1
          }

      - name: Check labels
        id: check
        env:
          FORGEJO_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          ISSUE_NUMBER="${{ github.event.issue.number }}"
          ISSUE_JSON=$(curl -s \
            "$GITHUB_SERVER_URL/api/v1/repos/$GITHUB_REPOSITORY/issues/$ISSUE_NUMBER" \
            -H "Authorization: token $FORGEJO_TOKEN")
          LABELS=$(echo "$ISSUE_JSON" | python3 -c "
          import sys, json
          try:
              d = json.load(sys.stdin)
              print(','.join(l['name'] for l in d.get('labels', [])))
          except Exception:
              print('')
          ")
          echo "issue #$ISSUE_NUMBER labels: ${LABELS:-<none>}"
          case ",$LABELS," in
            *,bug,*|*,enhancement,*)
              echo "relevant=true" >> "$GITHUB_OUTPUT"
              ;;
            *)
              echo "relevant=false" >> "$GITHUB_OUTPUT"
              ;;
          esac

  # ============================================================
  # triage: AI reads the codebase and decides fix/comment/skip.
  # ============================================================
  triage:
    needs: label_check
    if: github.event_name == 'issues' && needs.label_check.outputs.relevant == 'true'
    runs-on: ${{ vars.RUNNER_LABEL || 'rust-ci' }}
    container: ${{ vars.CONTAINER_IMAGE || '' }}
    outputs:
      action:      ${{ steps.parse.outputs.action }}
      branch_name: ${{ steps.parse.outputs.branch_name }}
      reason:      ${{ steps.parse.outputs.reason }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1
          token: ${{ github.token }}

      - name: Fetch issue comments
        env:
          FORGEJO_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          if ! curl -fsS \
              "$GITHUB_SERVER_URL/api/v1/repos/$GITHUB_REPOSITORY/issues/${{ github.event.issue.number }}/comments" \
              -H "Authorization: token $FORGEJO_TOKEN" \
              -o /tmp/comments.json \
            || ! python3 -c "import json,sys; json.load(open('/tmp/comments.json'))" >/dev/null 2>&1; then
            echo '[]' > /tmp/comments.json
          fi

      - name: Build triage prompt
        env:
          ISSUE_TITLE:  ${{ github.event.issue.title }}
          ISSUE_BODY:   ${{ github.event.issue.body }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
        run: |
          set -euo pipefail
          python3 - > /tmp/triage.md <<'PYEOF'
          import os, json
          title  = os.environ.get('ISSUE_TITLE', '')
          body   = os.environ.get('ISSUE_BODY', '')
          number = os.environ.get('ISSUE_NUMBER', '0')
          prefix = os.environ.get('ISSUE_BRANCH_PREFIX', 'issue-')
          with open('/tmp/comments.json') as f:
              data = json.load(f)
          comments_md = '(no comments)'
          if isinstance(data, list) and data:
              out = []
              for i, c in enumerate(data, 1):
                  u = (c.get('user') or {}).get('login', 'unknown')
                  b = (c.get('body') or '').strip()
                  if b:
                      out.append('--- comment ' + str(i) + ' by ' + u + ' ---\n' + b)
              if out:
                  comments_md = '\n\n'.join(out)
          print('# Task')
          print()
          print('Triage this issue for the Niello OS image repository and decide whether an AI can auto-fix it.')
          print('This repo contains a Containerfile-based immutable Fedora Atomic image (Niri compositor + Noctalia shell + Rust toolchain).')
          print('Read the Containerfile and supporting files as needed to make an informed decision.')
          print()
          print('# Issue #' + number)
          print()
          print('**Title:** ' + title)
          print()
          print('**Body:**')
          print()
          print(body or '(empty)')
          print()
          print('# Comments')
          print()
          print(comments_md)
          print()
          print('# Output')
          print()
          print('Write a JSON file to /tmp/triage.json with exactly these keys:')
          print('- `action`: one of "fix", "comment", or "skip"')
          print('- `branch_name`: if action is "fix", use `' + prefix + number + '`; otherwise empty string')
          print('- `reason`: one short sentence explaining the decision')
          print()
          print('Decision rules:')
          print('- "fix" if the issue describes a concrete Containerfile bug, package inclusion problem, config error, or enhancement that can be addressed by editing files in the repo.')
          print('- "comment" if it is a question, usage help, or needs human clarification.')
          print('- "skip" if it is spam, off-topic, or reports a problem in an upstream package that this repo cannot fix.')
          print()
          print('Write the file using your `write` tool. Do not output the JSON to your response.')
          PYEOF

      - name: Run opencode triage
        run: |
          set -euo pipefail
          MODEL_ARG=""
          if [ -n "$OPENCODE_MODEL" ]; then
            MODEL_ARG="--model $OPENCODE_MODEL"
          fi
          for attempt in 1 2 3 4 5; do
            echo "=== triage attempt $attempt ==="
            if opencode run "$(cat /tmp/triage.md)" \
              --format default \
              --pure \
              --dangerously-skip-permissions \
              $MODEL_ARG; then
              break
            else
              rc=$?
              echo "attempt $attempt failed (exit $rc)"
              [ $attempt -lt 5 ] && sleep $((attempt * 5)) || exit $rc
            fi
          done
          if [ ! -s /tmp/triage.json ]; then
            echo '{"action":"skip","branch_name":"","reason":"opencode produced no decision file"}' > /tmp/triage.json
          fi

      - name: Parse triage result
        id: parse
        run: |
          set -euo pipefail
          python3 - > /tmp/triage_parsed.json <<'PYEOF'
          import json, os, re
          prefix = os.environ.get('ISSUE_BRANCH_PREFIX', 'issue-')
          number = os.environ.get('ISSUE_NUMBER', '0')
          try:
              with open('/tmp/triage.json') as f:
                  data = json.load(f)
          except Exception:
              data = {}
          action = data.get('action', 'skip')
          if action not in ('fix', 'comment', 'skip'):
              action = 'skip'
          branch = data.get('branch_name', '') or ''
          if not re.match(r'^' + re.escape(prefix) + r'[0-9]+$', branch):
              branch = prefix + str(number)
          reason = data.get('reason', '') or ''
          out = {'action': action, 'branch_name': branch, 'reason': reason}
          with open('/tmp/triage_parsed.json', 'w') as f:
              json.dump(out, f)
          print(json.dumps(out))
          PYEOF
          ACTION=$(jq -r .action  /tmp/triage_parsed.json)
          BRANCH=$(jq -r .branch_name /tmp/triage_parsed.json)
          REASON=$(jq -r .reason  /tmp/triage_parsed.json)
          { echo "action=$ACTION"; echo "branch_name=$BRANCH"; echo "reason=$REASON"; } >> "$GITHUB_OUTPUT"

  # ============================================================
  # comment / skip-notify
  # ============================================================
  comment:
    needs: triage
    if: github.event_name == 'issues' && needs.triage.outputs.action == 'comment'
    runs-on: ${{ vars.RUNNER_LABEL || 'rust-ci' }}
    container: ${{ vars.CONTAINER_IMAGE || '' }}
    steps:
      - name: Acknowledge
        env:
          FORGEJO_TOKEN: ${{ github.token }}
        run: |
          jq -n '{body:"Thanks for the report — a maintainer will investigate."}' > /tmp/c.json
          curl -s -X POST \
            "$GITHUB_SERVER_URL/api/v1/repos/$GITHUB_REPOSITORY/issues/${{ github.event.issue.number }}/comments" \
            -H "Authorization: token $FORGEJO_TOKEN" \
            -H "Content-Type: application/json" -d @/tmp/c.json

  skip-notify:
    needs: triage
    if: github.event_name == 'issues' && needs.triage.outputs.action == 'skip'
    runs-on: ${{ vars.RUNNER_LABEL || 'rust-ci' }}
    container: ${{ vars.CONTAINER_IMAGE || '' }}
    steps:
      - name: Post skip reason
        env:
          FORGEJO_TOKEN: ${{ github.token }}
          REASON:        ${{ needs.triage.outputs.reason }}
        run: |
          cat > /tmp/build_skip.py << 'PYEOF'
          import os, json
          reason = os.environ.get('REASON', '').strip()
          base   = 'Auto-triage: skipping this issue.'
          hint   = 'If this is wrong, add the `bug` or `enhancement` label and re-comment, or open a PR manually.'
          body   = f"{base}\n\n{reason}\n\n{hint}" if reason else f"{base}\n\n{hint}"
          print(body)
          PYEOF
          BODY=$(REASON="$REASON" python3 /tmp/build_skip.py)
          jq -n --arg body "$BODY" '{body:$body}' > /tmp/c.json
          curl -s -X POST \
            "$GITHUB_SERVER_URL/api/v1/repos/$GITHUB_REPOSITORY/issues/${{ github.event.issue.number }}/comments" \
            -H "Authorization: token $FORGEJO_TOKEN" \
            -H "Content-Type: application/json" -d @/tmp/c.json

  # ============================================================
  # create-fix-branch: AI edits the Containerfile/files,
  # commits, opens PR to devops.
  # ============================================================
  create-fix-branch:
    needs: triage
    if: github.event_name == 'issues' && needs.triage.outputs.action == 'fix'
    runs-on: ${{ vars.RUNNER_LABEL || 'rust-ci' }}
    container: ${{ vars.CONTAINER_IMAGE || '' }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ github.token }}

      - name: Create branch off devops
        run: |
          set -euo pipefail
          BRANCH="${{ needs.triage.outputs.branch_name }}"
          git fetch origin "$DEVOPS_BRANCH" 2>/dev/null || true
          git checkout -b "$BRANCH" "origin/$DEVOPS_BRANCH" 2>/dev/null \
            || git checkout -b "$BRANCH"

      - name: Build fix prompt
        env:
          ISSUE_TITLE:  ${{ github.event.issue.title }}
          ISSUE_BODY:   ${{ github.event.issue.body }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          ISSUE_LABELS: ${{ join(github.event.issue.labels.*.name, ',') }}
          FORGEJO_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          if ! curl -fsS \
              "$GITHUB_SERVER_URL/api/v1/repos/$GITHUB_REPOSITORY/issues/$ISSUE_NUMBER/comments" \
              -H "Authorization: token $FORGEJO_TOKEN" \
              -o /tmp/comments.json \
            || ! python3 -c "import json,sys; json.load(open('/tmp/comments.json'))" >/dev/null 2>&1; then
            echo '[]' > /tmp/comments.json
          fi
          python3 - > /tmp/fix.md <<'PYEOF'
          import os, json
          title       = os.environ.get('ISSUE_TITLE', '')
          body        = os.environ.get('ISSUE_BODY', '')
          number      = os.environ.get('ISSUE_NUMBER', '0')
          labels_raw  = os.environ.get('ISSUE_LABELS', '')
          labels      = {x.strip().lower() for x in labels_raw.split(',') if x.strip()}
          mode        = 'enhancement' if 'enhancement' in labels else ('bug' if 'bug' in labels else 'other')
          with open('/tmp/comments.json') as f:
              data = json.load(f)
          comments_md = '(no comments)'
          if isinstance(data, list) and data:
              out = []
              for i, c in enumerate(data, 1):
                  u = (c.get('user') or {}).get('login', 'unknown')
                  b = (c.get('body') or '').strip()
                  if b:
                      out.append('--- comment ' + str(i) + ' by ' + u + ' ---\n' + b)
              if out:
                  comments_md = '\n\n'.join(out)
          print('# Task')
          print()
          print('This is the Niello OS image repository — an immutable Fedora Atomic image built with a Containerfile (Niri compositor + Noctalia shell + Rust toolchain).')
          print()
          if mode == 'bug':
              print('You are fixing a bug in this Containerfile-based OS image.')
              print('Find the root cause of the issue described below, then make the minimal, correct change to the Containerfile or supporting files.')
          elif mode == 'enhancement':
              print('You are implementing an enhancement to this Containerfile-based OS image.')
              print('The issue below describes a desired change — a new package, config change, or systemd unit. Implement it by editing the Containerfile and/or supporting files.')
          else:
              print('You are addressing an issue in this Containerfile-based OS image repository.')
          print()
          print('Do not write a JSON response. Edit files directly using your tools.')
          print()
          print('# Issue #' + number)
          print()
          print('**Title:** ' + title)
          print()
          print('**Body:**')
          print()
          print(body or '(empty)')
          print()
          print('# Comments')
          print()
          print(comments_md)
          print()
          print('# Workflow')
          print()
          print('1. Read the Containerfile and any supporting files (os-release override, systemd units, profile.d scripts, etc.)')
          print('2. Make the change the issue requires.')
          print('3. Do not commit — the workflow commits your changes.')
          print()
          print('# Rules')
          print()
          print('- Do NOT edit `.forgejo/workflows/*`.')
          print('- Do NOT add packages that conflict with the immutable/atomic base.')
          print('- Prefer `rpm-ostree install` for packages and `COPY` + systemd enable for config/units.')
          print('- If the issue is ambiguous, leave a TODO comment in the Containerfile and explain in a final message.')
          PYEOF

      - name: Run opencode fix
        run: |
          set -euo pipefail
          MODEL_ARG=""
          if [ -n "$OPENCODE_MODEL" ]; then
            MODEL_ARG="--model $OPENCODE_MODEL"
          fi
          for attempt in 1 2 3 4 5; do
            echo "=== fix attempt $attempt ==="
            if opencode run "$(cat /tmp/fix.md)" \
              --format default \
              --pure \
              --dangerously-skip-permissions \
              $MODEL_ARG; then
              break
            else
              rc=$?
              [ $attempt -lt 5 ] && sleep $((attempt * 5)) || exit $rc
            fi
          done

      - name: Commit and push
        id: commit
        run: |
          set -euo pipefail
          BRANCH="${{ needs.triage.outputs.branch_name }}"
          git config user.name  "$BOT_NAME"
          git config user.email "$BOT_EMAIL"
          git add -A
          if ! git diff --staged --quiet; then
            git commit -m "fix(ai): Issue #${{ github.event.issue.number }} — Fixes #${{ github.event.issue.number }} [release-bot-skip]"
            git push origin "$BRANCH"
            echo "pushed=true" >> "$GITHUB_OUTPUT"
          else
            echo "AI produced no changes."
            echo "pushed=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Comment when AI produced no changes
        if: steps.commit.outputs.pushed != 'true'
        env:
          FORGEJO_TOKEN: ${{ github.token }}
        run: |
          jq -n '{body:"Auto-triage: I could not produce a usable change for this issue. A human maintainer will need to look at this manually."}' > /tmp/c.json
          curl -s -X POST \
            "$GITHUB_SERVER_URL/api/v1/repos/$GITHUB_REPOSITORY/issues/${{ github.event.issue.number }}/comments" \
            -H "Authorization: token $FORGEJO_TOKEN" \
            -H "Content-Type: application/json" -d @/tmp/c.json

      - name: Close issue
        if: steps.commit.outputs.pushed == 'true'
        env:
          FORGEJO_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          ISSUE_NUM="${{ github.event.issue.number }}"
          jq -n '{body:"Auto-closed: an AI-generated fix has been opened as a PR against the devops branch. Merge it to land the change."}' > /tmp/c.json
          curl -s -X POST \
            "$GITHUB_SERVER_URL/api/v1/repos/$GITHUB_REPOSITORY/issues/$ISSUE_NUM/comments" \
            -H "Authorization: token $FORGEJO_TOKEN" \
            -H "Content-Type: application/json" -d @/tmp/c.json > /dev/null
          curl -s -X PATCH \
            "$GITHUB_SERVER_URL/api/v1/repos/$GITHUB_REPOSITORY/issues/$ISSUE_NUM" \
            -H "Authorization: token $FORGEJO_TOKEN" \
            -H "Content-Type: application/json" \
            -d '{"state":"closed"}' > /dev/null
          echo "closed issue #$ISSUE_NUM"

      - name: Open PR issue-N -> devops
        if: steps.commit.outputs.pushed == 'true'
        env:
          FORGEJO_TOKEN: ${{ github.token }}
          BRANCH:        ${{ needs.triage.outputs.branch_name }}
          BASE:          ${{ env.DEVOPS_BRANCH }}
          ISSUE:         ${{ github.event.issue.number }}
        run: |
          set -euo pipefail
          EXISTING=$(curl -s \
            "$GITHUB_SERVER_URL/api/v1/repos/$GITHUB_REPOSITORY/pulls?state=open&head=$BRANCH&base=$BASE" \
            -H "Authorization: token $FORGEJO_TOKEN")
          COUNT=$(echo "$EXISTING" | python3 -c "import sys,json; print(len(json.load(sys.stdin)))" 2>/dev/null || echo 0)
          if [ "$COUNT" -gt 0 ]; then
            echo "PR already open for $BRANCH -> $BASE - skipping."
            exit 0
          fi
          python3 - > /tmp/pr_body.json << 'PYEOF'
          import json, os
          print(json.dumps({
              'title': os.environ['BRANCH'] + ' -> ' + os.environ['BASE'],
              'head':  os.environ['BRANCH'],
              'base':  os.environ['BASE'],
              'body':  'Auto-implements #' + os.environ['ISSUE'] + '.\n\nOpen this PR to merge the AI-generated fix.',
          }))
          PYEOF
          RESP=$(curl -s -X POST "$GITHUB_SERVER_URL/api/v1/repos/$GITHUB_REPOSITORY/pulls" \
            -H "Authorization: token $FORGEJO_TOKEN" \
            -H "Content-Type: application/json" \
            -d @/tmp/pr_body.json)
          if echo "$RESP" | grep -q '"id"'; then
            echo "PR opened for $BRANCH -> $BASE"
          else
            echo "::warning::PR creation failed: $RESP"
            exit 1
          fi

  # ============================================================
  # build-iterate: runs on push to issue-* branches.
  # Validates the Containerfile builds; AI-fix loop on failure.
  # ============================================================
  build-iterate:
    if: github.event_name == 'push'
    runs-on: ${{ vars.RUNNER_LABEL || 'rust-ci' }}
    container: ${{ vars.CONTAINER_IMAGE || '' }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ github.token }}

      - name: Build image (iteration 0)
        id: build
        continue-on-error: true
        run: |
          set -o pipefail
          podman build --tag niello:issue-test . 2>&1 | tee /tmp/build.log

      - name: AI-fix loop (3 attempts)
        if: steps.build.outcome == 'failure'
        run: |
          set -uo pipefail
          for iter in 1 2 3; do
            echo "=== AI-fix iteration $iter ==="

            python3 - > /tmp/aifix.md <<'PYEOF'
          try:
              with open('/tmp/build.log', 'rb') as f:
                  log = f.read()[-12000:].decode('utf-8', errors='replace')
          except Exception:
              log = 'No build log available.'
          print('# Task')
          print()
          print('The Niello container image build below failed. Read the Containerfile and any supporting files, find the root cause, and fix it.')
          print('Do not output JSON. Edit files directly using your tools.')
          print()
          print('# Workflow')
          print()
          print('1. Read the Containerfile and any related files.')
          print('2. Locate the root cause from the build log.')
          print('3. Make the minimal fix. Edit files in place.')
          print('4. Do not commit — the workflow commits the diff.')
          print()
          print('# Rules')
          print()
          print('- Minimal change only.')
          print('- Do NOT edit `.forgejo/workflows/*`.')
          print()
          print('# Build log (last 12KB)')
          print()
          print('```')
          print(log.rstrip())
          print('```')
          PYEOF

            MODEL_ARG=""
            if [ -n "$OPENCODE_MODEL" ]; then
              MODEL_ARG="--model $OPENCODE_MODEL"
            fi
            opencode run "$(cat /tmp/aifix.md)" \
              --format default \
              --pure \
              --dangerously-skip-permissions \
              $MODEL_ARG || true

            git config user.name  "$BOT_NAME"
            git config user.email "$BOT_EMAIL"
            git add -A
            if ! git diff --staged --quiet; then
              git commit -m "fix(ci): Containerfile AI-fix iteration $iter"
              git push
            else
              echo "opencode produced no changes."
            fi

            set +e
            podman build --tag niello:issue-test . 2>&1 | tee /tmp/build.log
            BUILD_RC=$?
            set -e
            if [ "$BUILD_RC" = "0" ]; then
              echo "build OK after iteration $iter"
              exit 0
            fi
          done
          echo "AI-fix gave up after 3 iterations."
          exit 1

  create-pr:
    needs: build-iterate
    if: github.event_name == 'push' && needs.build-iterate.result == 'success'
    runs-on: ${{ vars.RUNNER_LABEL || 'rust-ci' }}
    container: ${{ vars.CONTAINER_IMAGE || '' }}
    steps:
      - name: Open PR issue-N -> devops
        env:
          FORGEJO_TOKEN: ${{ github.token }}
          HEAD:          ${{ github.ref_name }}
          BASE:          ${{ env.DEVOPS_BRANCH }}
        run: |
          set -euo pipefail
          EXISTING=$(curl -s \
            "$GITHUB_SERVER_URL/api/v1/repos/$GITHUB_REPOSITORY/pulls?state=open&head=$HEAD&base=$BASE" \
            -H "Authorization: token $FORGEJO_TOKEN")
          COUNT=$(echo "$EXISTING" | python3 -c "import sys,json; print(len(json.load(sys.stdin)))" 2>/dev/null || echo 0)
          if [ "$COUNT" -gt 0 ]; then
            echo "PR already open for $HEAD -> $BASE - skipping."
            exit 0
          fi
          python3 - > /tmp/pr_body.json << 'PYEOF'
          import json, os
          print(json.dumps({
              'title': os.environ['HEAD'] + ' -> ' + os.environ['BASE'],
              'head':  os.environ['HEAD'],
              'base':  os.environ['BASE'],
              'body':  'Automated PR from CI pipeline.',
          }))
          PYEOF
          RESP=$(curl -s -X POST "$GITHUB_SERVER_URL/api/v1/repos/$GITHUB_REPOSITORY/pulls" \
            -H "Authorization: token $FORGEJO_TOKEN" \
            -H "Content-Type: application/json" \
            -d @/tmp/pr_body.json)
          if echo "$RESP" | grep -q '"id"'; then
            echo "PR opened for $HEAD -> $BASE"
          else
            echo "::warning::PR creation failed: $RESP"
            exit 1
          fi
