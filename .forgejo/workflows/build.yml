name: Build and push image

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: '05 10 * * *'  # 10:05am UTC daily
  workflow_dispatch:

env:
  IMAGE_REGISTRY: ghcr.io/akinus21
  IMAGE_NAME: niello

jobs:
  build_and_fix:
    name: Build with self-healing loop
    runs-on: rust-ci

    permissions:
      contents: write
      packages: write

    steps:
      - name: Check out repository
        run: |
          SERVER="${{ forgejo.server_url }}"
          SERVER="${SERVER#https://}"
          git clone --branch=${{ forgejo.ref_name }} --depth=1 "https://${{ secrets.forgejo_token }}@${SERVER}/${{ forgejo.repository }}.git" repo
          cd repo
          git fetch --all
          git reset --hard ${{ forgejo.sha }}

      - name: Build and fix (OpenCode)
        env:
          OLLAMA_HOST: https://ollama.akinus21.com
          MAX_ATTEMPTS: 5
          IMAGE_REGISTRY: ghcr.io/akinus21
          IMAGE_NAME: niello
        run: |
          opencode run "Build the Containerfile in this repository. If the build fails, analyze the error and fix any files needed (Containerfile, configs, scripts, etc.) to resolve it. Iterate until the build succeeds. When the build succeeds: 1) tag and push the image to $IMAGE_REGISTRY/$IMAGE_NAME:latest, 2) auto-merge the fix into main, 3) delete the fix branch."

  build_and_fix_nvidia:
    name: Build NVIDIA variant with self-healing loop
    runs-on: rust-ci
    if: github.event_name != 'pull_request'

    permissions:
      contents: write
      packages: write

    steps:
      - name: Check out repository
        run: |
          SERVER="${{ forgejo.server_url }}"
          SERVER="${SERVER#https://}"
          git clone --branch=${{ forgejo.ref_name }} --depth=1 "https://${{ secrets.forgejo_token }}@${SERVER}/${{ forgejo.repository }}.git" repo
          cd repo
          git fetch --all
          git reset --hard ${{ forgejo.sha }}

      - name: Build NVIDIA variant
        env:
          OLLAMA_HOST: https://ollama.akinus21.com
          MAX_ATTEMPTS: 5
          IMAGE_REGISTRY: ghcr.io/akinus21
          IMAGE_NAME: niello
          GAMING: true
        run: |
          opencode run "Build the Containerfile in this repository with GAMING=true. If the build fails, analyze the error and fix any files needed to resolve it. Iterate until the build succeeds. When the build succeeds: 1) tag and push the image to $IMAGE_REGISTRY/$IMAGE_NAME:nvidia, 2) auto-merge the fix into main, 3) delete the fix branch."
