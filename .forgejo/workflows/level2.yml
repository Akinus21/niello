name: Level 2 — Devops
run-name: "→ ${{ vars.MAIN_BRANCH || 'main' }} ← ${{ github.ref_name }}"

on:
  push:
    branches: [devops]  # edit if your staging branch is named differently

env:
  BOT_NAME:          ${{ vars.BOT_NAME || 'devops-bot' }}
  BOT_EMAIL:         ${{ vars.BOT_EMAIL || 'devops-bot@akinus21.com' }}
  DEVOPS_BRANCH:     ${{ vars.DEVOPS_BRANCH || 'devops' }}
  MAIN_BRANCH:       ${{ vars.MAIN_BRANCH || 'main' }}
  OPENCODE_MODEL:    ${{ vars.OPENCODE_MODEL || '' }}
  GITHUB_SERVER_URL: ${{ github.server_url }}
  GITHUB_REPOSITORY: ${{ github.repository }}
  RUNNER_LABEL:      ${{ vars.RUNNER_LABEL || 'rust-ci' }}
  CONTAINER_IMAGE:   ${{ vars.CONTAINER_IMAGE || '' }}

concurrency:
  group: level2-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ============================================================
  # build: validate the Containerfile builds cleanly.
  # No push — this is a staging check only.
  # AI-fix loop on failure.
  # ============================================================
  build:
    runs-on: ${{ vars.RUNNER_LABEL || 'rust-ci' }}
    container: ${{ vars.CONTAINER_IMAGE || '' }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ github.token }}

      - name: Preflight
        run: |
          set -euo pipefail
          command -v podman >/dev/null 2>&1 || {
            echo "::error::podman not on PATH — rebuild the rust-ci image"
            exit 1
          }
          command -v opencode >/dev/null 2>&1 || {
            echo "::error::opencode not on PATH"
            exit 1
          }
          [ -n "${{ github.token }}" ] || {
            echo "::error::github.token is empty"
            exit 1
          }

      - name: Build image (iteration 0)
        id: build
        continue-on-error: true
        run: |
          set -o pipefail
          podman build --tag niello:staging . 2>&1 | tee /tmp/build.log

      - name: AI-fix loop (3 attempts)
        if: steps.build.outcome == 'failure'
        run: |
          set -uo pipefail
          for iter in 1 2 3; do
            echo "=== AI-fix iteration $iter ==="

            python3 - > /tmp/aifix.md <<'PYEOF'
          try:
              with open('/tmp/build.log', 'rb') as f:
                  log = f.read()[-12000:].decode('utf-8', errors='replace')
          except Exception:
              log = 'No build log available.'
          print('# Task')
          print()
          print('The container image build below failed. Read the Containerfile and any supporting files, find the root cause, and fix it.')
          print('Do not output JSON. Edit files directly using your tools.')
          print()
          print('# Workflow')
          print()
          print('1. Read the Containerfile and any related files (os-release override, systemd units, scripts).')
          print('2. Locate the root cause of the build failure from the log below.')
          print('3. Make the minimal fix. Edit files in place.')
          print('4. Do not commit — the workflow commits and pushes the diff after you return.')
          print()
          print('# Rules')
          print()
          print('- Make the minimal change that fixes the build.')
          print('- Do NOT edit `.forgejo/workflows/*`.')
          print('- Prefer fixing the Containerfile or supporting files over changing the base image unless the base image is clearly the problem.')
          print()
          print('# Build log (last 12KB)')
          print()
          print('```')
          print(log.rstrip())
          print('```')
          PYEOF

            MODEL_ARG=""
            if [ -n "$OPENCODE_MODEL" ]; then
              MODEL_ARG="--model $OPENCODE_MODEL"
            fi
            opencode run "$(cat /tmp/aifix.md)" \
              --format default \
              --pure \
              --dangerously-skip-permissions \
              $MODEL_ARG || true

            git config user.name  "$BOT_NAME"
            git config user.email "$BOT_EMAIL"
            git add -A
            if ! git diff --staged --quiet; then
              git commit -m "fix(ci): Containerfile AI-fix iteration $iter"
              git push
            else
              echo "opencode produced no changes this iteration."
            fi

            set +e
            podman build --tag niello:staging . 2>&1 | tee /tmp/build.log
            BUILD_RC=$?
            set -e
            if [ "$BUILD_RC" = "0" ]; then
              echo "build OK after iteration $iter"
              exit 0
            fi
          done
          echo "AI-fix gave up after 3 iterations."
          exit 1

  # ============================================================
  # create-pr: open devops → main PR.
  # ============================================================
  create-pr:
    needs: build
    if: needs.build.result == 'success'
    runs-on: ${{ vars.RUNNER_LABEL || 'rust-ci' }}
    container: ${{ vars.CONTAINER_IMAGE || '' }}
    steps:
      - name: Open PR devops -> main
        env:
          FORGEJO_TOKEN: ${{ github.token }}
          HEAD:          ${{ env.DEVOPS_BRANCH }}
          BASE:          ${{ env.MAIN_BRANCH }}
        run: |
          set -euo pipefail
          EXISTING=$(curl -s \
            "$GITHUB_SERVER_URL/api/v1/repos/$GITHUB_REPOSITORY/pulls?state=open&head=$HEAD&base=$BASE" \
            -H "Authorization: token $FORGEJO_TOKEN")
          COUNT=$(echo "$EXISTING" | python3 -c "import sys,json; print(len(json.load(sys.stdin)))" 2>/dev/null || echo 0)
          if [ "$COUNT" -gt 0 ]; then
            echo "PR already open for $HEAD -> $BASE - skipping."
            exit 0
          fi
          python3 - > /tmp/pr_body.json << 'PYEOF'
          import json, os
          print(json.dumps({
              'title': os.environ['HEAD'] + ' -> ' + os.environ['BASE'],
              'head':  os.environ['HEAD'],
              'base':  os.environ['BASE'],
              'body':  'Automated PR from CI pipeline.',
          }))
          PYEOF
          RESP=$(curl -s -X POST "$GITHUB_SERVER_URL/api/v1/repos/$GITHUB_REPOSITORY/pulls" \
            -H "Authorization: token $FORGEJO_TOKEN" \
            -H "Content-Type: application/json" \
            -d @/tmp/pr_body.json)
          if echo "$RESP" | grep -q '"id"'; then
            echo "PR opened for $HEAD -> $BASE"
          else
            echo "::warning::PR creation failed: $RESP"
            exit 1
          fi

  # ============================================================
  # close-merged-issue: scan commits for Fixes #N markers.
  # ============================================================
  close-merged-issue:
    needs: create-pr
    if: needs.create-pr.result == 'success'
    runs-on: ${{ vars.RUNNER_LABEL || 'rust-ci' }}
    container: ${{ vars.CONTAINER_IMAGE || '' }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 50
          token: ${{ github.token }}

      - name: Capture commits on this branch
        id: scan
        run: |
          set -euo pipefail
          git log "$MAIN_BRANCH..HEAD" --pretty=%B > /tmp/commits.txt || true
          {
            echo "commits<<EOF"
            cat /tmp/commits.txt
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Close issues referenced by Fixes/Closes markers
        env:
          FORGEJO_TOKEN:     ${{ github.token }}
          REPO:              ${{ github.repository }}
          COMMITS:           ${{ steps.scan.outputs.commits }}
          GITHUB_SERVER_URL: ${{ github.server_url }}
          MAIN_BRANCH:       ${{ vars.MAIN_BRANCH || 'main' }}
        run: |
          set -euo pipefail
          COMMITS="$COMMITS" \
          FORGEJO_TOKEN="$FORGEJO_TOKEN" \
          REPO="$REPO" \
          GITHUB_SERVER_URL="$GITHUB_SERVER_URL" \
          python3 - << 'PYEOF'
          import os, re, sys, json, urllib.request, urllib.error

          TOKEN  = os.environ['FORGEJO_TOKEN']
          REPO   = os.environ['REPO']
          SERVER = os.environ['GITHUB_SERVER_URL']
          commits = os.environ.get('COMMITS', '')

          issue_nums = sorted(set(int(m.group(1)) for m in re.finditer(
              r'(?i)\b(?:fix(?:es|ed)?|close[sd]?|resolve[sd]?)\s+#(\d+)', commits
          )))

          if not issue_nums:
              print("no Fixes/Closes #N markers found")
              sys.exit(0)

          def api(method, path, body=None):
              data = json.dumps(body).encode() if body else None
              req = urllib.request.Request(
                  f"{SERVER}/api/v1/{path}", data=data, method=method,
                  headers={"Authorization": f"token {TOKEN}",
                           "Content-Type": "application/json"})
              try:
                  with urllib.request.urlopen(req) as r:
                      return json.loads(r.read() or b'{}')
              except urllib.error.HTTPError as e:
                  print(f"HTTP {e.code}: {method} {path}")
                  return None

          for n in issue_nums:
              issue = api("GET", f"repos/{REPO}/issues/{n}")
              if not issue:
                  print(f"issue #{n} not found")
                  continue
              if issue.get('state') == 'closed':
                  print(f"issue #{n} already closed")
                  continue
              if 'pull_request' in issue:
                  print(f"#{n} is a PR, skipping")
                  continue
              api("POST", f"repos/{REPO}/issues/{n}/comments",
                  {"body": "Closed automatically: merged into main via this PR."})
              ok = api("PATCH", f"repos/{REPO}/issues/{n}", {"state": "closed"})
              print(f"closed issue #{n}: {'ok' if ok else 'failed'}")
          PYEOF
